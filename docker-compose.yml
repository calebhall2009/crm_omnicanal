services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: monorepo-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - monorepo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      retries: 3
      timeout: 5s

  # Redis Cache Service
  redis:
    image: redis:alpine
    container_name: monorepo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - monorepo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  # Laravel 13 Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monorepo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_db
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
      REDIS_HOST: redis
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    networks:
      - monorepo-network

  # FastAPI Channels Service
  channels-service:
    build:
      context: ./channels-service
      dockerfile: Dockerfile
    container_name: monorepo-channels-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./channels-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monorepo-network

  # FastAPI AI Service (Microservicio de Inteligencia Artificial)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: monorepo-ai-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./ai-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      LARAVEL_INTERNAL_URL: http://backend:8000
      LARAVEL_INTERNAL_SECRET: omniflow_internal_secret_2026
      AI_PROVIDER: gemini
      GEMINI_MODEL: gemini-1.5-flash
    networks:
      - monorepo-network

networks:
  monorepo-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
